<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拖拽小例子</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="main">
    <!-- 组件区域开始 -->
    <div id="left">
      <h3>组件库</h3>
      <p draggable="true">预览文本</p>
      <button draggable="true">预览按钮</button>
      <input placeholder="预览输入框" type="text" draggable="true">
      <img src="./img/demo.jpg" alt="示例图片" draggable="true">
      <!-- 新增组件 -->
      <textarea placeholder="预览文本域" draggable="true"></textarea>
      <!-- 用div包装select元素以解决拖拽问题 -->
      <div draggable="true" class="select-wrapper">
        <select>
          <option>选项1</option>
          <option>选项2</option>
          <option>选项3</option>
        </select>
      </div>
      <div draggable="true">
        <input type="checkbox" id="checkbox1">
        <label for="checkbox1">复选框</label>
      </div>
      <div draggable="true">
        <input type="radio" id="radio1" name="radioGroup">
        <label for="radio1">单选框</label>
      </div>
      <div draggable="true">
        <input type="range" min="0" max="100" value="50">
        <span>滑块</span>
      </div>
    </div>
    <!-- 组件区域结束 -->
    <!-- 编辑区域开始 -->
    <div id="midden">
    </div>
    <!-- 编辑区域结束 -->
    <!-- 属性区域开始 -->
    <div id="right">
      <h3>属性面板</h3>
      <label class="item">
        <span class="text">width</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">height</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">top</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">left</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">text</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">src</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">color</span>
        <input class="inp" type="text">
      </label>
      <label class="item">
        <span class="text">font-size</span>
        <input class="inp" type="text">
      </label>
      <label class="item" title="双击退出全屏预览">
        <button class="btn look">全屏预览</button>
      </label>
      <label class="item">
        <button class="btn down">下载源码</button>
      </label>
      <label class="item">
        <button class="btn clear">清除全部</button>
      </label>
    </div>
    <!-- 属性区域结束 -->
    <!-- 全屏预览区域开始 -->
    <div class="code"></div>
    <!-- 全屏预览区域结束 -->
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
